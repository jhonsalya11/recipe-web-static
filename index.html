<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resep Pribadi — Masakan & Kopi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <h1 class="logo">🍳☕ Resep Ku</h1>
      <p class="tagline">Koleksi resep masakan &amp; kopi favorit pribadi</p>
    </div>
  </header>

  <main class="container">

    <section class="controls">
      <input
        type="text"
        id="searchInput"
        placeholder="Cari resep... (contoh: nasi, kopi, pedas)"
        class="search-input"
      >

      <div class="filter-tabs" id="filterTabs">
        <button class="tab active" data-filter="all">Semua</button>
        <button class="tab" data-filter="makanan">Makanan</button>
        <button class="tab" data-filter="kopi">Kopi</button>
      </div>
    </section>

    <section id="recipeGrid" class="recipe-grid">
      <!-- Recipe cards di-render oleh JS -->
    </section>

    <p id="emptyState" class="empty-state" hidden>
      Tidak ada resep yang cocok. Coba kata kunci lain.
    </p>

  </main>

  <!-- Modal detail resep -->
  <div id="recipeModal" class="modal" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>Dibuat untuk koleksi resep pribadi.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
